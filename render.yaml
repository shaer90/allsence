services:
  - type: web
    name: allsence
    env: node
    plan: free
    buildCommand: npm install && npm run render-build
    startCommand: node server/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DB_PATH
        value: /var/data/allsence.db
    disk:
      name: allsence-data
      mountPath: /var/data
      sizeGB: 1
